<div class="dashboard-page-header">
    <h1 class="page-title">📅 대시보드</h1>
    <button type="button" class="theme-toggle" onclick="toggleDashboardTheme()" id="dashboardThemeBtn">
        <i class="fas fa-moon"></i> 다크모드
    </button>
</div>

<div class="calendar-container">
    <div class="dashboard-calendar-header">
        <div class="calendar-title" id="dashboardCalendarTitle">2026년 3월</div>
        <div class="calendar-nav">
            <button type="button" class="nav-btn" onclick="dashboardChangeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
            <button type="button" class="nav-btn" onclick="dashboardChangeMonth(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <div class="filter-container">
        <button type="button" class="filter-btn active" data-filter="all">전체</button>
        <button type="button" class="filter-btn" data-filter="진행">진행</button>
        <button type="button" class="filter-btn" data-filter="완료">완료</button>
        <div class="dashboard-search-wrap">
            <input type="text" id="dashboardCalendarSearch" class="dashboard-search-input" placeholder="캘린더 검색">
            <button type="button" id="dashboardCalendarSearchClear" class="dashboard-search-clear" aria-label="검색어 지우기">&times;</button>
        </div>
    </div>

    <div class="calendar-weekdays">
        <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
    </div>

    <div class="dashboard-calendar-grid-wrap">
        <div class="calendar-grid" id="dashboardCalendarGrid"></div>
        <div class="dashboard-calendar-period-overlay" id="dashboardCalendarPeriodOverlay" aria-hidden="true"></div>
    </div>
</div>
<!-- 일정 상세 모달 -->
<div class="modal event-modal" id="dashboardEventModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">일정 상세</div>
            <button type="button" class="modal-close" onclick="closeDashboardEventModal()">&times;</button>
        </div>
        <div id="dashboardEventModalBody"></div>
    </div>
</div>
<!-- 일자별 일정 목록 모달 -->
<div class="modal event-modal" id="dashboardDayEventsModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="dashboardDayEventsTitle">일정 목록</div>
            <button type="button" class="modal-close" onclick="closeDashboardDayEventsModal()">&times;</button>
        </div>
        <div id="dashboardDayEventsBody"></div>
    </div>
</div>
