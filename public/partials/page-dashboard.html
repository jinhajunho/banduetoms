<div class="dashboard-page-header">
    <h1 class="page-title">대시보드</h1>
    <button type="button" class="theme-toggle" onclick="toggleDashboardTheme()" id="dashboardThemeBtn">
        <i class="fas fa-moon"></i> 다크모드
    </button>
</div>

<div class="calendar-container">
    <div class="dashboard-calendar-header">
        <div class="calendar-title" id="dashboardCalendarTitle">2026년 3월</div>
        <div class="calendar-nav">
            <button type="button" class="nav-btn" onclick="dashboardChangeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
            <button type="button" class="nav-btn" onclick="dashboardChangeMonth(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <div class="filter-container">
        <button type="button" class="filter-btn active" data-filter="all">전체</button>
        <button type="button" class="filter-btn" data-filter="진행">진행</button>
        <button type="button" class="filter-btn" data-filter="완료">완료</button>
        <div class="dashboard-calendar-filter-right">
            <button type="button" class="btn btn-primary btn-sm" id="dashboardCalendarRegisterBtn">캘린더 등록</button>
            <div class="dashboard-search-wrap">
                <input type="text" id="dashboardCalendarSearch" class="dashboard-search-input" placeholder="캘린더 검색">
                <button type="button" id="dashboardCalendarSearchClear" class="dashboard-search-clear" aria-label="검색어 지우기">&times;</button>
            </div>
        </div>
    </div>

    <div class="calendar-weekdays">
        <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
    </div>

    <div class="dashboard-calendar-grid-wrap">
        <div class="calendar-grid" id="dashboardCalendarGrid"></div>
        <div class="dashboard-calendar-period-overlay" id="dashboardCalendarPeriodOverlay" aria-hidden="true"></div>
    </div>
</div>
<!-- 일정 상세 모달 -->
<div class="modal event-modal" id="dashboardEventModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">일정 상세</div>
            <button type="button" class="modal-close" onclick="closeDashboardEventModal()">&times;</button>
        </div>
        <div id="dashboardEventModalBody"></div>
    </div>
</div>
<!-- 캘린더 수동 일정 등록 -->
<div class="modal event-modal" id="dashboardManualTaskModal">
    <div class="modal-content dashboard-manual-task-modal-content">
        <div class="modal-header">
            <div class="modal-title" id="dashboardManualTaskModalTitle">캘린더 일정 등록</div>
            <div class="dashboard-manual-task-header-actions">
                <button type="button" class="btn btn-secondary btn-sm" id="dashboardManualTaskModalEdit" style="display:none;">수정</button>
                <button type="button" class="modal-close" id="dashboardManualTaskModalClose" aria-label="닫기">&times;</button>
            </div>
        </div>
        <div class="dashboard-manual-task-form">
            <div class="modal-form-row">
                <label class="modal-form-label" for="dashboardManualTaskStatus">상태</label>
                <select id="dashboardManualTaskStatus" class="modal-form-control">
                    <option value="견적">견적</option>
                    <option value="진행" selected>진행</option>
                    <option value="완료">완료</option>
                    <option value="보류">보류</option>
                </select>
            </div>
            <div class="modal-form-row">
                <label class="modal-form-label" for="dashboardManualTaskTitle">작업제목</label>
                <input type="text" id="dashboardManualTaskTitle" class="modal-form-control" placeholder="제목" autocomplete="off">
            </div>
            <div class="modal-form-row">
                <label class="modal-form-label" for="dashboardManualTaskBody">작업내용</label>
                <textarea id="dashboardManualTaskBody" class="modal-form-control dashboard-manual-task-textarea" rows="3" placeholder="내용"></textarea>
            </div>
            <div class="modal-form-row">
                <label class="modal-form-label" for="dashboardManualTaskAssignee">담당자</label>
                <input type="text" id="dashboardManualTaskAssignee" class="modal-form-control" placeholder="담당자" autocomplete="off">
            </div>
            <div class="modal-form-row modal-form-row--2col">
                <div>
                    <label class="modal-form-label" for="dashboardManualTaskStart">진행일</label>
                    <input type="date" id="dashboardManualTaskStart" class="modal-form-control">
                </div>
                <div>
                    <label class="modal-form-label" for="dashboardManualTaskEnd">완료일</label>
                    <input type="date" id="dashboardManualTaskEnd" class="modal-form-control">
                </div>
            </div>
        </div>
        <div class="modal-footer dashboard-manual-task-modal-footer">
            <button type="button" class="btn btn-secondary btn-sm" id="dashboardManualTaskModalCancel">취소</button>
            <button type="button" class="btn btn-danger btn-sm" id="dashboardManualTaskModalDelete" style="display:none;">삭제</button>
            <button type="button" class="btn btn-primary btn-sm" id="dashboardManualTaskModalSave">저장</button>
        </div>
    </div>
</div>

<!-- 일자별 일정 목록 모달 -->
<div class="modal event-modal" id="dashboardDayEventsModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="dashboardDayEventsTitle">일정 목록</div>
            <button type="button" class="modal-close" onclick="closeDashboardDayEventsModal()">&times;</button>
        </div>
        <div id="dashboardDayEventsBody"></div>
    </div>
</div>
