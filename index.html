<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반듯한시공 - 관리시스템</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
    <div class="container">
        <!-- 사이드바 -->
        <div class="sidebar" id="sidebar">
            <!-- 사이드바 토글 버튼 (경계선에 위치) -->
            <button class="sidebar-toggle" onclick="toggleSidebar()" title="사이드바 접기/펼치기">
                <i class="fas fa-chevron-left"></i>
            </button>
            
            <a href="#dashboard" class="logo" onclick="showPage('dashboard'); return false;">
                <span class="logo-icon">
                    <img src="/logo.svg" alt="" class="site-logo site-logo--sidebar" width="44" height="44" decoding="async"
                        onerror="this.onerror=null;this.src='/logo.png';">
                </span>
                <span class="logo-label">반듯한시공</span>
            </a>
            <nav class="nav-menu">
                <a href="#dashboard" class="nav-item active" data-page="dashboard" onclick="showPage('dashboard'); return false;">
                    <i class="fas fa-th-large"></i>
                    <span>대시보드</span>
                </a>
                <a href="#estimate" class="nav-item" data-page="estimate" onclick="showPage('estimate'); return false;">
                    <i class="fas fa-file-invoice"></i>
                    <span>프로젝트 관리</span>
                </a>
                <a href="#performance" class="nav-item" data-page="performance" onclick="showPage('performance'); return false;">
                    <i class="fas fa-chart-line"></i>
                    <span>경영실적관리</span>
                </a>
                <a href="#weekly" class="nav-item" data-page="weekly" onclick="showPage('weekly'); return false;">
                    <i class="fas fa-calendar-week"></i>
                    <span>주간보고</span>
                </a>
                <a href="#unpaid" class="nav-item" data-page="unpaid" onclick="showPage('unpaid'); return false;">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>미수금</span>
                </a>
                <a href="#contractors" class="nav-item" data-page="contractors" onclick="showPage('contractors'); return false;">
                    <i class="fas fa-building"></i>
                    <span>업체정보관리</span>
                </a>
                <a href="#expenses" class="nav-item" data-page="expenses" onclick="showPage('expenses'); return false;">
                    <i class="fas fa-receipt"></i>
                    <span>경비지출관리</span>
                </a>
                <a href="#sga" class="nav-item" data-page="sga" onclick="showPage('sga'); return false;">
                    <i class="fas fa-briefcase"></i>
                    <span>판관비관리</span>
                </a>
                <a href="#users" class="nav-item" data-page="users" onclick="showPage('users'); return false;">
                    <i class="fas fa-users-cog"></i>
                    <span>관리자설정</span>
                </a>
            </nav>
            <div class="user-section">
                <div class="user-info">
                    <div class="user-avatar" id="sidebarUserAvatar">방</div>
                    <div>
                        <div id="sidebarUserName" style="font-weight: 600; color: var(--gray-900);">방준호</div>
                        <div id="sidebarUserRole" style="font-size: 12px; color: var(--gray-500);">관리자</div>
                    </div>
                </div>
                <button class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> 로그아웃
                </button>
            </div>
        </div>

        <!-- 메인 콘텐츠 -->
        <div class="main-content">
            <!-- 대시보드: 마크업은 public/partials/page-dashboard.html (dashboard-partial-loader.js 주입) -->
            <div id="page-dashboard" class="page-section active"></div>

            <!-- 프로젝트 관리: public/partials/page-estimate.html (estimate-partial-loader.js 주입, index-bootstrap에서 app.js 전) -->
            <div id="page-estimate" class="page-section" style="display: none;"></div>

            <!-- 프로젝트 관리 CSV 업로드 미리보기 -->
            <div class="modal event-modal" id="estimateImportModal" onclick="if(event.target===this) closeEstimateImportModal()">
                <div class="modal-content contractor-import-modal-content" onclick="event.stopPropagation()">
                    <div class="modal-header">
                        <div class="modal-title">프로젝트 CSV 업로드</div>
                        <button type="button" class="modal-close" onclick="closeEstimateImportModal()">&times;</button>
                    </div>
                    <div id="estimateImportModalBody"></div>
                </div>
            </div>

            <!-- 경영실적관리: public/partials/page-performance.html (performance-partial-loader.js 주입, 기간별 날짜 패널 포함) -->
            <div id="page-performance" class="page-section" style="display: none;"></div>

            <!-- 주간보고: public/partials/page-weekly.html (weekly-partial-loader.js 주입, index-bootstrap에서 app.js 전) -->
            <div id="page-weekly" class="page-section" style="display: none;"></div>

            <!-- 미수금: public/partials/page-unpaid.html (unpaid-partial-loader.js 주입, index-bootstrap에서 app.js 전) -->
            <div id="page-unpaid" class="page-section" style="display: none;"></div>

            <!-- 업체정보관리: public/partials/page-contractors.html (contractor-partial-loader.js 주입. CSV/등록·상세 모달은 index 유지) -->
            <div id="page-contractors" class="page-section" style="display: none;"></div>

            <!-- 업체 CSV 업로드 미리보기 -->
            <div class="modal event-modal" id="contractorImportModal" onclick="if(event.target===this) closeContractorImportModal()">
                <div class="modal-content contractor-import-modal-content" onclick="event.stopPropagation()">
                    <div class="modal-header">
                        <div class="modal-title">업체 CSV 업로드</div>
                        <button type="button" class="modal-close" onclick="closeContractorImportModal()">&times;</button>
                    </div>
                    <div id="contractorImportModalBody"></div>
                </div>
            </div>

            <!-- 업체 등록·수정 중앙 모달 -->
            <div class="panel-overlay" id="contractorPanelOverlay" onclick="closeContractorPanel()"></div>

            <div class="slide-panel expense-panel expense-center-modal contractor-panel" id="contractorSlidePanel">
                <div class="panel-header expense-panel-header">
                    <div class="panel-title-wrap">
                        <span class="panel-title" id="contractorPanelTitle">업체 등록</span>
                    </div>
                    <button type="button" class="btn btn-sm expense-panel-header-delete" id="contractorPanelDeleteBtn" style="display: none;" aria-hidden="true">
                        삭제
                    </button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="saveContractor()">
                        <i class="fas fa-save"></i> 저장
                    </button>
                    <button type="button" class="panel-close" onclick="closeContractorPanel()" aria-label="닫기">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="panel-body expense-panel-body contractor-panel-body">
                    <div class="panel-form-row">
                        <label class="panel-form-label" for="contractorName">업체명 <span class="required">*</span></label>
                        <input type="text" class="form-input" id="contractorName" placeholder="업체명을 입력하세요">
                    </div>
                    <div class="panel-form-row">
                        <label class="panel-form-label" for="contractorPhone">전화번호</label>
                        <input type="tel" class="form-input" id="contractorPhone" placeholder="010-1234-5678">
                    </div>
                    <div class="panel-form-section-label">첨부 서류</div>
                    <div class="panel-form-row">
                        <label class="panel-form-label">사업자등록증</label>
                        <div class="file-upload file-upload-box">
                            <input type="file" id="businessLicense" style="display: none;" accept="image/*,.pdf" onchange="updateContractorFileName('businessLicense')">
                            <button type="button" class="file-button" onclick="document.getElementById('businessLicense').click()">
                                <i class="fas fa-file-alt"></i> 파일 선택
                            </button>
                            <span class="file-name" id="businessLicenseName">선택한 파일 없음</span>
                            <div id="contractorLicenseChipList" class="expense-receipt-chip-list"></div>
                        </div>
                    </div>

                    <div class="panel-form-row">
                        <label class="panel-form-label">통장사본</label>
                        <div class="file-upload file-upload-box">
                            <input type="file" id="bankAccount" style="display: none;" accept="image/*,.pdf" onchange="updateContractorFileName('bankAccount')">
                            <button type="button" class="file-button" onclick="document.getElementById('bankAccount').click()">
                                <i class="fas fa-university"></i> 파일 선택
                            </button>
                            <span class="file-name" id="bankAccountName">선택한 파일 없음</span>
                            <div id="contractorBankChipList" class="expense-receipt-chip-list"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 업체 상세 중앙 모달 (행 클릭 시) -->
            <div class="panel-overlay" id="contractorDetailOverlay" onclick="closeContractorDetailPanel()"></div>
            <div class="slide-panel expense-panel expense-detail-panel expense-center-modal contractor-panel contractor-detail-panel" id="contractorDetailSlidePanel">
                <div class="panel-header expense-panel-header expense-detail-panel-header">
                    <div class="panel-title-wrap">
                        <span class="panel-title">업체 상세</span>
                    </div>
                    <div class="expense-detail-header-trailing">
                        <button type="button" class="btn btn-secondary btn-sm" id="contractorDetailEditBtn">수정</button>
                        <button type="button" class="panel-close" onclick="closeContractorDetailPanel()" aria-label="닫기">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div class="panel-body expense-panel-body contractor-panel-body" id="contractorDetailBody">
                    <!-- JS에서 채움 -->
                </div>
            </div>

            <!-- 경비지출관리: public/partials/page-expenses.html (expense-partial-loader.js 주입. CSV·등록/상세 패널은 index 유지) -->
            <div id="page-expenses" class="page-section" style="display: none;"></div>

            <!-- 경비 CSV 업로드 미리보기 -->
            <div class="modal event-modal" id="expenseImportModal" onclick="if(event.target===this) closeExpenseImportModal()">
                <div class="modal-content expense-import-modal-content" onclick="event.stopPropagation()">
                    <div class="modal-header">
                        <div class="modal-title">경비 CSV 업로드</div>
                        <button type="button" class="modal-close" onclick="closeExpenseImportModal()">&times;</button>
                    </div>
                    <div id="expenseImportModalBody"></div>
                </div>
            </div>

            <!-- 판관비관리: public/partials/page-sga.html (sga-partial-loader.js) -->
            <div id="page-sga" class="page-section" style="display: none;"></div>

            <!-- 판관비 CSV 업로드 미리보기 -->
            <div class="modal event-modal" id="sgaImportModal" onclick="if(event.target===this) closeSgaImportModal()">
                <div class="modal-content sga-import-modal-content" onclick="event.stopPropagation()">
                    <div class="modal-header">
                        <div class="modal-title">판관비 CSV 업로드</div>
                        <button type="button" class="modal-close" onclick="closeSgaImportModal()">&times;</button>
                    </div>
                    <div id="sgaImportModalBody"></div>
                </div>
            </div>

            <!-- 경비 등록·수정 중앙 모달 -->
            <div class="panel-overlay" id="expensePanelOverlay" onclick="closeExpensePanel()"></div>

            <div class="slide-panel expense-panel expense-center-modal" id="expenseSlidePanel">
                <div class="panel-header expense-panel-header">
                    <div class="panel-title-wrap">
                        <span class="panel-title" id="expensePanelTitle">경비 등록</span>
                    </div>
                    <button type="button" class="btn btn-sm expense-panel-header-delete" id="expensePanelDeleteBtn" style="display: none;" aria-hidden="true">
                        삭제
                    </button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="saveExpense()">
                        <i class="fas fa-save"></i> 저장
                    </button>
                    <button type="button" class="panel-close" onclick="closeExpensePanel()" aria-label="닫기">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="panel-body expense-panel-body" onmousedown="var t=event.target,i=document.getElementById('expenseUsageDate');if(i&&t.id!=='expenseUsageDate'&&!t.closest('label[for=expenseUsageDate]'))i.blur();">
                    <div class="panel-form-row">
                        <label class="panel-form-label">구분 <span class="required">*</span></label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" id="expenseTypeCard" name="expensePaymentType" value="카드사용" checked>
                                <label for="expenseTypeCard">카드사용</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="expenseTypeTransfer" name="expensePaymentType" value="계좌이체">
                                <label for="expenseTypeTransfer">계좌이체</label>
                            </div>
                        </div>
                    </div>
                    <div class="panel-form-row">
                        <label class="panel-form-label" for="expenseAmount">결제 금액 <span class="required">*</span></label>
                        <input type="number" class="form-input" id="expenseAmount" placeholder="0" min="0">
                    </div>
                    <div class="panel-form-row">
                        <label class="panel-form-label" for="expenseBuilding">사용건물</label>
                        <input type="text" class="form-input" id="expenseBuilding" placeholder="사용건물을 입력하세요">
                    </div>
                    <div class="panel-form-row">
                        <label class="panel-form-label">사용일시 <span class="required">*</span></label>
                        <input type="date" class="form-input" id="expenseUsageDate" onclick="if(this.showPicker) this.showPicker()">
                    </div>
                    <div class="panel-form-row">
                        <label class="panel-form-label" for="expensePurpose">사용목적</label>
                        <input type="text" class="form-input" id="expensePurpose" placeholder="사용목적을 입력하세요">
                    </div>
                    <div class="panel-form-section-label">첨부</div>
                    <div class="panel-form-row">
                        <label class="panel-form-label">영수증 / 사진</label>
                        <div class="file-upload file-upload-box">
                            <input type="file" id="expenseReceipt" style="display: none;" accept="image/*,.pdf" multiple onchange="updateExpenseFileName()">
                            <button type="button" class="file-button" onclick="document.getElementById('expenseReceipt').click()">
                                <i class="fas fa-file-image"></i> 파일 선택 (복수 가능)
                            </button>
                            <span class="file-name" id="expenseReceiptName">선택한 파일 없음</span>
                        </div>
                        <div id="expenseReceiptChipList" class="expense-receipt-chip-list" aria-live="polite"></div>
                    </div>
                </div>
            </div>

            <!-- 경비 상세 중앙 모달 (행 클릭 시) -->
            <div class="panel-overlay" id="expenseDetailOverlay" onclick="closeExpenseDetailPanel()"></div>
            <div class="slide-panel expense-panel expense-detail-panel expense-center-modal" id="expenseDetailSlidePanel">
                <div class="panel-header expense-panel-header expense-detail-panel-header">
                    <div class="panel-title-wrap">
                        <span class="panel-title">경비 상세</span>
                    </div>
                    <div class="expense-detail-header-trailing">
                        <button type="button" class="btn btn-secondary btn-sm" id="expenseDetailEditBtn">수정</button>
                        <button type="button" class="panel-close" onclick="closeExpenseDetailPanel()" aria-label="닫기">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div class="panel-body expense-panel-body" id="expenseDetailBody">
                    <!-- JS에서 채움 -->
                </div>
            </div>

            <!-- 판관비 상세 중앙 모달 (행 클릭 시) -->
            <div class="panel-overlay" id="sgaDetailOverlay" onclick="closeSgaDetailPanel()"></div>
            <div class="slide-panel expense-panel expense-detail-panel expense-center-modal" id="sgaDetailSlidePanel">
                <div class="panel-header expense-panel-header expense-detail-panel-header">
                    <div class="panel-title-wrap">
                        <span class="panel-title">판관비 상세</span>
                    </div>
                    <div class="expense-detail-header-trailing">
                        <button type="button" class="btn btn-secondary btn-sm" id="sgaDetailEditBtn">수정</button>
                        <button type="button" class="panel-close" onclick="closeSgaDetailPanel()" aria-label="닫기">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div class="panel-body expense-panel-body" id="sgaDetailBody">
                    <!-- JS에서 채움 -->
                </div>
            </div>

            <!-- 판관비 등록·수정 중앙 모달 -->
            <div class="panel-overlay" id="sgaPanelOverlay" onclick="closeSgaPanel()"></div>
            <div class="slide-panel expense-panel expense-center-modal" id="sgaSlidePanel">
                <div class="panel-header expense-panel-header">
                    <div class="panel-title-wrap">
                        <span class="panel-title" id="sgaPanelTitle">판관비 등록</span>
                    </div>
                    <button type="button" class="btn btn-sm expense-panel-header-delete" id="sgaPanelDeleteBtn" style="display: none;" aria-hidden="true">
                        삭제
                    </button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="saveSgaExpense()">
                        <i class="fas fa-save"></i> 저장
                    </button>
                    <button type="button" class="panel-close" onclick="closeSgaPanel()" aria-label="닫기">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="panel-body expense-panel-body">
                    <div class="panel-form-row">
                        <label class="panel-form-label" for="sgaDate">지출일자 <span class="required">*</span></label>
                        <input type="date" class="form-input" id="sgaDate">
                    </div>
                    <div class="panel-form-row">
                        <label class="panel-form-label" for="sgaCategory">계정과목 <span class="required">*</span></label>
                        <input type="text" class="form-input" id="sgaCategory" placeholder="예: 임대료, 통신비, 인건비">
                    </div>
                    <div class="panel-form-row">
                        <label class="panel-form-label" for="sgaAmount">금액(vat별도) <span class="required">*</span></label>
                        <input type="number" class="form-input" id="sgaAmount" placeholder="0" min="0">
                    </div>
                    <div class="panel-form-row">
                        <label class="panel-form-label" for="sgaMemo">메모</label>
                        <input type="text" class="form-input" id="sgaMemo" placeholder="메모를 입력하세요">
                    </div>
                </div>
            </div>

            <!-- 관리자설정: public/partials/page-users.html (users-partial-loader.js) -->
            <div id="page-users" class="page-section" style="display: none;"></div>

        </div>
    </div>

    <script type="module" src="/src/js/index-auth-gate.js"></script>

</body>
</html>
